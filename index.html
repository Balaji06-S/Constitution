<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Law - Know Your Rights</title>
    <link rel="stylesheet" href="style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="app">
        <!-- Login Page (Visible by default) -->
        <div id="login-page" class="login-page">
            <div class="login-card">
                <div class="login-header">
                    <div class="login-logo">
                        <i data-lucide="globe" class="chakra-icon" style="width: 40px; height: 40px;"></i> Law
                    </div>
                    <h1 id="login-title">Citizen Portal</h1>
                    <p id="login-subtitle">Enter your phone number to access legal help.</p>
                </div>

                <form id="login-form" class="login-form">
                    <div id="phone-input-group" class="input-group">
                        <label id="phone-label">Phone Number</label>
                        <div class="input-with-icon">
                            <i data-lucide="phone" style="width: 20px; height: 20px;"></i>
                            <input type="tel" id="phone-number" placeholder="00000 00000" required maxlength="10">
                        </div>
                        <p id="otp-hint" class="otp-hint">We'll send an OTP for verification.</p>
                    </div>

                    <div id="otp-input-group" class="input-group" style="display: none;">
                        <label id="otp-label">Enter 6-Digit OTP</label>
                        <div class="otp-input-container">
                            <input type="text" class="otp-digit" maxlength="1" inputmode="numeric" required>
                            <input type="text" class="otp-digit" maxlength="1" inputmode="numeric" required>
                            <input type="text" class="otp-digit" maxlength="1" inputmode="numeric" required>
                            <input type="text" class="otp-digit" maxlength="1" inputmode="numeric" required>
                            <input type="text" class="otp-digit" maxlength="1" inputmode="numeric" required>
                            <input type="text" class="otp-digit" maxlength="1" inputmode="numeric" required>
                        </div>
                    </div>

                    <button type="submit" id="login-btn" class="login-btn">Send OTP</button>
                    <button type="button" id="resend-otp-btn" class="back-link" style="display: none; margin-top: 1rem;">Resend OTP</button>
                </form>

                <div class="login-footer">
                    🇮🇳 Protected by Indian Law
                </div>
            </div>
        </div>

        <!-- Main App (Hidden by default) -->
        <div id="main-app" class="app-container" style="display: none;">
            <nav class="top-nav">
                <div class="nav-logo" id="logo-refresh" style="cursor:pointer">
                    <i data-lucide="globe" class="chakra-icon" style="width: 28px; height: 28px;"></i>
                    <span>Law</span>
                </div>
                <div class="nav-actions">
                    <button class="nav-btn" id="nav-home"><i data-lucide="home" style="width: 18px; height: 18px;"></i><span class="t-home">Home</span></button>
                    <button class="nav-btn" id="nav-documents"><i data-lucide="building-2" style="width: 18px; height: 18px;"></i><span class="t-documents">Documents</span></button>
                    <button class="nav-btn" id="nav-contact"><i data-lucide="phone" style="width: 18px; height: 18px;"></i><span class="t-contact">Contact</span></button>
                    <button class="nav-btn assistant-btn" id="nav-assistant"><i data-lucide="message-square" style="width: 18px; height: 18px;"></i><span class="t-legalAI">Legal AI</span></button>
                    <button class="nav-btn" id="nav-quiz"><i data-lucide="trophy" style="width: 18px; height: 18px;"></i><span class="t-quizMode">Quiz Mode</span></button>
                    <div class="lang-selector">
                        <i data-lucide="globe" style="width: 18px; height: 18px;"></i>
                        <select id="language-select">
                            <option value="EN">English</option>
                            <option value="HI">हिंदी</option>
                            <option value="TE">తెలుగు</option>
                            <option value="KN">ಕನ್ನಡ</option>
                            <option value="MR">मराठी</option>
                            <option value="TA">தமிழ்</option>
                            <option value="BN">বাংলা</option>
                            <option value="GU">ગુજરાતી</option>
                            <option value="ML">മലയാളം</option>
                            <option value="OR">ଓଡ଼ିଆ</option>
                            <option value="PA">ਪੰਜਾਬੀ</option>
                        </select>
                    </div>
                    <button class="nav-btn" id="logout-btn"><i data-lucide="x" style="width: 18px; height: 18px;"></i> Logout</button>
                </div>
            </nav>

            <header class="hero">
                <div class="hero-content">
                    <h1 id="hero-title">Know Your Rights</h1>
                    <p id="hero-subtitle">Understand the law in simple terms.</p>
                    <div class="search-container">
                        <i data-lucide="search" class="search-icon" style="width: 24px; height: 24px;"></i>
                        <input type="text" id="search-input" placeholder="Describe what happened...">
                        <button class="voice-btn" id="voice-btn" title="Voice Search">
                            <i data-lucide="mic" id="mic-icon" style="width: 20px; height: 20px;"></i>
                        </button>
                    </div>
                    <div class="category-tags" id="category-tags">
                        <!-- Categories will be injected here -->
                    </div>
                </div>
            </header>

            <main class="content">
                <section class="quick-nav-section">
                    <div class="quick-nav-cards">
                        <button class="quick-nav-card" id="card-home">
                            <div class="icon-wrapper"><i data-lucide="home" style="width: 32px; height: 32px;"></i></div>
                            <div class="card-text"><h3 class="t-home">Home</h3><p>Main Page</p></div>
                        </button>
                        <button class="quick-nav-card" id="card-documents">
                            <div class="icon-wrapper"><i data-lucide="building-2" style="width: 32px; height: 32px;"></i></div>
                            <div class="card-text"><h3 class="t-documents">Documents</h3><p>Law Sections</p></div>
                        </button>
                        <button class="quick-nav-card" id="card-contact">
                            <div class="icon-wrapper"><i data-lucide="phone" style="width: 32px; height: 32px;"></i></div>
                            <div class="card-text"><h3 class="t-contact">Contact</h3><p>Find Lawyers</p></div>
                        </button>
                    </div>
                </section>

                <section class="article-grid" id="article-grid">
                    <!-- Articles will be injected here -->
                </section>
            </main>

            <footer class="footer">
                <p>&copy; 2026 Law. Patriotic Legal Guide 🇮🇳</p>
            </footer>
        </div>

        <!-- Modals -->
        <div id="modal-overlay" class="modal-overlay" style="display: none;">
            <!-- Modal content will be injected here -->
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
